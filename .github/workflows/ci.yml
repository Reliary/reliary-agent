name: CI (guardrails)
on: [push, pull_request]
jobs:
  msrv:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: ["1.75", "1.80", "stable"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rust-version: ${{ matrix.rust }}
      - name: Build (MSRV ${{ matrix.rust }})
        run: cargo check --release

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install tools
        run: |
          cargo install cargo-audit cargo-deny 2>/dev/null
      - name: cargo test
        run: cargo test --release
      - name: clippy (deny warnings)
        run: cargo clippy -- -D warnings
      - name: cargo audit
        run: cargo audit --deny-warnings 2>/dev/null || echo "WARN: audit found issues"
      - name: cargo deny
        run: cargo deny check bans 2>/dev/null || echo "WARN: deny found violations"
      - name: Test count check
        run: |
          count=$(cargo test --release --no-run 2>&1 | grep -c "running" || true)
          echo "Test count: $count"
          [ "$count" -ge 55 ] || echo "WARN: test count below 55 ($count)"
      - name: Binary size check
        run: |
          ls -lh target/release/reliary-agent 2>/dev/null || echo "Binary not built"
