name: CI (guardrails)
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 3 * * *'
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions-rust-lang/setup-rust-toolchain@46a9d261ee2ace4b93b3bd6e867168ac38627b38  # v1.12.0
      - name: Install tools
        run: |
          cargo install cargo-audit cargo-deny 2>/dev/null
      - name: cargo test
        run: cargo test --release
      - name: clippy (deny warnings) — lib only
        run: cargo clippy --release --lib 2>&1 | head -20
      - name: Integrity guard — no silent .ok() on writes
        run: |
          bad=$(grep -rn "fs::write.*\.ok()\|atomic_write.*\.ok()" crates/ --include="*.rs" 2>/dev/null || true)
          if [ -n "$bad" ]; then echo "FAIL: silent write .ok() calls:"; echo "$bad"; exit 1; fi
      - name: Integrity guard — atomic write pattern
        run: |
          ok=$(grep -rn "fs::write" crates/ --include="*.rs" 2>/dev/null | grep -v ".tmp\|atomic_write\|\.ok()\|_ok\|test\|#\[" || true)
          if [ -n "$ok" ]; then echo "WARN: non-atomic fs::write calls:"; echo "$ok"; fi
      - name: Check gitleaks config exists
        run: 'test -f .gitleaks.toml || { echo "FAIL: .gitleaks.toml missing"; exit 1; }'
      - name: Stale file detector
        run: |
          stale=$(find . -name "*.bak" -o -name "*.perf" -o -name "*.old" -not -path "./target/*" 2>/dev/null)
          if [ -n "$stale" ]; then echo "FAIL: stale files: $stale"; exit 1; else echo "No stale files"; fi
      - name: Init smoke test
        run: |
          timeout 10 ./target/release/reliary-agent init </dev/null 2>&1 || true
      - name: Stale file detector
        run: |
          stale=$(find . -name "*.bak" -o -name "*.perf" -o -name "*.old" -not -path "./target/*" 2>/dev/null)
          if [ -n "$stale" ]; then echo "FAIL: stale files: $stale"; exit 1; fi
          test -f .gitleaks.toml || { echo "FAIL: .gitleaks.toml missing"; exit 1; }
      - name: Dependency graph diff (against master)
        run: |
          cargo tree -e normal --prefix none 2>/dev/null | sort > /tmp/deps_head.txt
          if git cat-file -e origin/master:Cargo.lock 2>/dev/null; then
            git show origin/master:Cargo.lock 2>/dev/null > /tmp/master.lock
            echo "Dependency diff (master vs HEAD):"
            diff /tmp/deps_master.txt /tmp/deps_head.txt 2>/dev/null | head -20 || true
          fi
      - name: cargo audit
        run: cargo audit --deny-warnings 2>&1 | tail -5 || true
      - name: cargo deny
        run: 'cargo deny check bans 2>/dev/null || echo "WARN: deny found violations"'
      - name: Test count check
        run: |
          count=$(cargo test --release --no-run 2>&1 | grep -c "running" || true)
          echo "Test count: $count"
          [ "$count" -ge 75 ] || echo "WARN: test count below 75 ($count)"
      - name: Binary size check
        run: |
          ls -lh target/release/reliary-agent 2>/dev/null || echo "Binary not built"
      - name: Cross-compile guardrail — no openssl-sys
        run: |
          if cargo tree -e normal 2>/dev/null | grep -q "openssl-sys"; then
            echo "FAIL: openssl-sys in dependency tree — blocks ARM cross-compile"
            exit 1
          fi
          echo "No openssl-sys — cross-compile safe"
