name: CI (guardrails)
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions-rust-lang/setup-rust-toolchain@46a9d261ee2ace4b93b3bd6e867168ac38627b38

      - name: Install tools
        run: |
          cargo install cargo-audit cargo-deny 2>/dev/null || true
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck 2>/dev/null || true
          curl -sL "https://github.com/rhysd/actionlint/releases/download/v1.7.7/actionlint_1.7.7_linux_amd64.tar.gz" | sudo tar -xz -C /usr/local/bin actionlint 2>/dev/null || true

      - name: Build
        run: cargo build --release

      - name: cargo test
        run: cargo test --release -- --test-threads=1

      - name: clippy
        run: cargo clippy --all-targets --release -- -D warnings 2>&1 || { echo 'clippy FAIL'; exit 1; }

      - name: ok() guard
        run: |
          bad=$(grep -rn "\.ok();" crates/ --include="*.rs" 2>/dev/null | grep -v "GUARDED: intentional\|test\|#\[cfg\|\.and_then\|filter_map\|\.ok()?\|// ok" || true)
          if [ -n "$bad" ]; then echo "FAIL"; echo "$bad"; exit 1; fi

      - name: CLI docs check
        run: |
          cmds=$(grep -A50 "^pub const CLI_COMMANDS" crates/reliary-agent/src/main.rs 2>/dev/null | grep '"' | grep -oP '"[a-z][a-z-]+"' | tr -d '"' | sort -u || true)
          missing=""
          for cmd in $cmds; do
            if ! grep -q "$cmd" README.md 2>/dev/null; then missing="$missing  $cmd\n"; fi
          done
          if [ -n "$missing" ]; then echo "FAIL"; printf "$missing"; exit 1; fi

      - name: cargo audit
        run: cargo audit --deny warnings 2>&1 | tail -5 || echo 'audit found issues'

      - name: cargo deny
        run: |
          cargo deny check advisories 2>/dev/null || { echo 'advisories FAIL'; exit 1; }
          cargo deny check sources 2>/dev/null || { echo 'sources FAIL'; exit 1; }
          cargo deny check bans 2>/dev/null || { echo 'bans FAIL'; exit 1; }

      - name: actionlint
        run: actionlint .github/workflows/*.yml 2>/dev/null || echo 'actionlint found issues'

      - name: shellcheck
        run: shellcheck scripts/*.sh 2>/dev/null || echo 'shellcheck found issues'

      - name: gitleaks config
        run: test -f .gitleaks.toml || { echo 'FAIL'; exit 1; }

      - name: stale files
        run: |
          stale=$(find . -name "*.bak" -o -name "*.perf" -o -name "*.old" -not -path "./target/*" 2>/dev/null)
          if [ -n "$stale" ]; then echo "FAIL"; echo "$stale"; exit 1; fi

      - name: gate.js sync
        run: |
          if ! diff pi/gate.js crates/reliary-agent/pi/gate.js >/dev/null 2>&1; then
            echo "gate.js out of sync"; exit 1; fi

      - name: gate.js tests
        run: node scripts/test_gate_levels.js

      - name: no openssl-sys
        run: |
          if cargo tree -e normal 2>/dev/null | grep -q "openssl-sys"; then
            echo "openssl-sys blocks ARM"; exit 1; fi

      - name: binary size
        run: ls -lh target/release/reliary-agent 2>/dev/null || true

      - name: test count
        run: |
          count=$(cargo test 2>&1 | grep "^test result:" | grep -oP '\d+(?= passed)' | python3 -c "import sys; print(sum(int(l) for l in sys.stdin if l.strip()))")
          echo "Test count: $count"
