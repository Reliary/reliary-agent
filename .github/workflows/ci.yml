name: CI (guardrails)
"on":
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 3 * * *'
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions-rust-lang/setup-rust-toolchain@46a9d261ee2ace4b93b3bd6e867168ac38627b38  # v1.12.0
      - name: Install tools
        run: |
          cargo install cargo-audit cargo-deny 2>/dev/null
      - name: Validate workflow YAML syntax
        run: |
          pip install pyyaml -q 2>/dev/null || true
          for f in .github/workflows/*.yml; do
            python3 -c "import yaml; yaml.safe_load(open('$f'))" || { echo "FAIL: $f has invalid YAML"; exit 1; }
            echo "  OK: $f"
          done
      - name: Build
        run: cargo build --release
      - name: cargo test
        run: cargo test --release -- --test-threads=1
      - name: gate.js ISTQB tests (log levels, binary discovery)
        run: node scripts/test_gate_levels.js
      - name: clippy (deny warnings) — all targets
        run: cargo clippy --all-targets --release -- -D warnings 2>&1 || { echo "clippy found warnings - FAIL"; exit 1; }
      - name: Integrity guard — no bare .ok(); without GUARDED annotation
        run: |
          bad=$(grep -rn "\.ok();" crates/ --include="*.rs" 2>/dev/null | grep -v "GUARDED: intentional\|test\|#\[cfg\|\.and_then\|filter_map\|\.ok()?\|// ok" || true)
          if [ -n "$bad" ]; then echo "FAIL: bare .ok(); calls without // GUARDED: intentional:"; echo "$bad"; exit 1; fi
          echo "All .ok(); calls are intentional or guarded"
      - name: Integrity guard — atomic write pattern
        run: |
          ok=$(grep -rn "fs::write" crates/ --include="*.rs" 2>/dev/null | grep -v ".tmp\|atomic_write\|\.ok()\|_ok\|test\|#\[" || true)
          if [ -n "$ok" ]; then echo "WARN: non-atomic fs::write calls:"; echo "$ok"; fi
      - name: Integrity guard — SQLite connections set PRAGMA
        run: |
          bad=""
          while IFS= read -r line; do
            file=$(echo "$line" | cut -d: -f1)
            lineno=$(echo "$line" | cut -d: -f2)
            # Check next 5 lines for PRAGMA
            block=$(sed -n "$((lineno+1)),$((lineno+5))p" "$file")
            if ! echo "$block" | grep -q "PRAGMA"; then
              bad="$bad  $file:$lineno\n"
            fi
          done < <(grep -rn "Connection::open\|Connection::open_with_flags" crates/ --include="*.rs" 2>/dev/null | grep -v "test\|#\[cfg(test)" || true)
          if [ -n "$bad" ]; then echo "FAIL: Connection::open without PRAGMA in next 5 lines:"; printf "$bad"; exit 1; fi
          echo "All SQLite connections set PRAGMA"
      - name: Integrity guard — regex compiled via LazyLock/OnceLock
        run: |
          bad=$(grep -rn "Regex::new" crates/ --include="*.rs" 2>/dev/null | grep -v "LazyLock\|OnceLock\|test\|#\[cfg(test)" || true)
          if [ -n "$bad" ]; then echo "WARN: Regex::new outside LazyLock (recompiles per invocation):"; echo "$bad"; fi
      - name: Integrity guard — file reads have size guard
        run: |
          bad=""
          while IFS= read -r line; do
            file=$(echo "$line" | cut -d: -f1)
            lineno=$(echo "$line" | cut -d: -f2)
            block=$(sed -n "$((lineno>5 ? lineno-5 : 1)),$((lineno+2))p" "$file")
            if ! echo "$block" | grep -q "meta\.len\|MAX_FILE_SIZE\|// GUARDED"; then
              bad="$bad  $file:$lineno\n"
            fi
          done < <(grep -rn "read_to_string" crates/ --include="*.rs" 2>/dev/null | grep -v "test\|#\[cfg(test)\|\.is_ok\|\.unwrap\|eprintln" || true)
          if [ -n "$bad" ]; then echo "WARN: read_to_string without metadata() or // GUARDED in preceding 5 lines:"; printf "$bad"; fi
      - name: Integrity guard — CLI commands documented in README
        run: |
          cmds=$(grep -A50 "^pub const CLI_COMMANDS" crates/reliary-agent/src/main.rs 2>/dev/null | grep '"' | grep -oP '"[a-z][a-z-]+"' | tr -d '"' | sort -u || true)
          missing=""
          for cmd in $cmds; do
            if ! grep -q "$cmd" README.md 2>/dev/null; then
              missing="$missing  $cmd\n"
            fi
          done
          if [ -n "$missing" ]; then echo "FAIL: CLI commands missing from README:"; printf "$missing"; exit 1; fi
          echo "All CLI commands documented in README"
      - name: Check gitleaks config exists
        run: 'test -f .gitleaks.toml || { echo "FAIL: .gitleaks.toml missing"; exit 1; }'
      - name: Stale file detector
        run: |
          stale=$(find . -name "*.bak" -o -name "*.perf" -o -name "*.old" -not -path "./target/*" 2>/dev/null)
          if [ -n "$stale" ]; then echo "FAIL: stale files: $stale"; exit 1; else echo "No stale files"; fi
      - name: Init smoke test
        run: |
          timeout 10 ./target/release/reliary-agent init </dev/null 2>&1 || true
      - name: Integrity guard — gate.js copies in sync
        run: |
          if ! diff pi/gate.js crates/reliary-agent/pi/gate.js >/dev/null 2>&1; then
            echo "FAIL: pi/gate.js and crates/reliary-agent/pi/gate.js out of sync"
            echo "  Run: cp pi/gate.js crates/reliary-agent/pi/gate.js"
            exit 1
          fi
          echo "gate.js copies in sync"
      - name: QoL guard — --version flag exists
        run: |
          if ! ./target/release/reliary-agent --version 2>/dev/null | grep -q "reliary-agent"; then
            echo "FAIL: --version flag not working"
            exit 1
          fi
          echo "QoL: --version works"
      - name: QoL guard — internal commands hidden from --help
        run: |
          cmds=$(./target/release/reliary-agent --help 2>/dev/null)
          for hidden in fix-file apply-edit session-state memory veto fix-dir mcp; do
            # Check hidden command is NOT in the Commands: section
            cmds_section=$(echo "$cmds" | sed -n '/Commands:/,/^$/p')
            if echo "$cmds_section" | grep -q "\b$hidden\b"; then
              echo "FAIL: '$hidden' should be hidden from --help"
              exit 1
            fi
          done
          echo "QoL: internal commands hidden"
      - name: QoL guard — config shows file paths
        run: |
          out=$(./target/release/reliary-agent config 2>/dev/null)
          if ! echo "$out" | grep -q "Global:"; then
            echo "FAIL: 'config' output doesn't show file paths"
            exit 1
          fi
          echo "QoL: config shows paths"
      - name: QoL guard — config shows source of truth
        run: |
          out=$(./target/release/reliary-agent config 2>/dev/null)
          if ! echo "$out" | grep -q "from:"; then
            echo "FAIL: 'config' output doesn't show source of truth"
            exit 1
          fi
          echo "QoL: config shows source"
      - name: QoL guard — config --format json is valid JSON
        run: |
          out=$(./target/release/reliary-agent --format json config 2>/dev/null)
          if ! echo "$out" | python3 -c "import sys,json; json.load(sys.stdin)" 2>/dev/null; then
            echo "FAIL: 'config --format json' output is not valid JSON"
            echo "$out"
            exit 1
          fi
          # Check required keys
          if ! echo "$out" | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'mode' in d and 'mode_source' in d and 'features' in d" 2>/dev/null; then
            echo "FAIL: JSON output missing required keys (mode, mode_source, features)"
            exit 1
          fi
          echo "QoL: config JSON valid with source keys"
      - name: README guard — default mode matches code
        run: |
          # Config code defaults to reactive, README must not claim strict as default
          if grep -q "default.*strict\|strict.*default" README.md 2>/dev/null | grep -v "transparent"; then
            echo "WARN: README claims strict as default mode — code defaults to reactive"
          fi
          echo "QoL: README default mode check passed"
      - name: QoL guard — doctor --format json is valid JSON
        run: |
          out=$(./target/release/reliary-agent --format json doctor 2>/dev/null)
          if ! echo "$out" | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'ready' in d and 'checks' in d" 2>/dev/null; then
            echo "FAIL: 'doctor --format json' output missing required keys"
            exit 1
          fi
          echo "QoL: doctor JSON valid"
      - name: QoL guard — status --format json is valid JSON
        run: |
          out=$(./target/release/reliary-agent --format json status 2>/dev/null)
          if ! echo "$out" | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'proxy' in d and 'mode' in d" 2>/dev/null; then
            echo "FAIL: 'status --format json' output missing required keys"
            exit 1
          fi
          echo "QoL: status JSON valid"
      - name: QoL guard — dead produces real output
        run: |
          out=$(./target/release/reliary-agent dead . 2>/dev/null)
          if ! echo "$out" | grep -q "Dead Code\|No dead code"; then
            echo "FAIL: 'dead' output should contain header or no-results message"
            exit 1
          fi
          echo "QoL: dead produces real output"
      - name: cargo audit
        run: cargo audit --deny warnings 2>&1 | tail -5 || true
      - name: cargo deny
        shell: bash
        run: 'cargo deny check bans 2>/dev/null || echo "WARN: deny found violations"'
      - name: Test count check
        run: |
          count=$(cargo test 2>&1 | grep "^test result:" | grep -oP '\d+(?= passed)' | python3 -c "import sys; print(sum(int(l) for l in sys.stdin if l.strip()))")
          echo "Test count: $count"
          [ "$count" -ge 120 ] || echo "WARN: test count below 120 ($count)"
      - name: Binary size check
        run: |
          ls -lh target/release/reliary-agent 2>/dev/null || echo "Binary not built"
      - name: Cross-compile guardrail — no openssl-sys
        run: |
          if cargo tree -e normal 2>/dev/null | grep -q "openssl-sys"; then
            echo "FAIL: openssl-sys in dependency tree — blocks ARM cross-compile"
            exit 1
          fi
          echo "No openssl-sys — cross-compile safe"
