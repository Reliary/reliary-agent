name: CI (guardrails)
"on":
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 3 * * *'
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions-rust-lang/setup-rust-toolchain@46a9d261ee2ace4b93b3bd6e867168ac38627b38  # v1.12.0
      - name: Install tools
        run: |
          cargo install cargo-audit cargo-deny 2>/dev/null
      - name: Validate workflow YAML syntax
        run: |
          pip install pyyaml -q 2>/dev/null || true
          for f in .github/workflows/*.yml; do
            python3 -c "import yaml; yaml.safe_load(open('$f'))" || { echo "FAIL: $f has invalid YAML"; exit 1; }
            echo "  OK: $f"
          done
      - name: Build
        run: cargo build --release
      - name: cargo test
        run: cargo test --release -- --test-threads=1
      - name: gate.js ISTQB tests (log levels, binary discovery)
        run: node scripts/test_gate_levels.js
      - name: clippy (deny warnings) — lib only
        run: cargo clippy --release --lib 2>&1 | head -20
      - name: Integrity guard — no silent .ok() on writes
        run: |
          bad=$(grep -rn "fs::write.*\.ok()\|atomic_write.*\.ok()" crates/ --include="*.rs" 2>/dev/null || true)
          if [ -n "$bad" ]; then echo "FAIL: silent write .ok() calls:"; echo "$bad"; exit 1; fi
      - name: Integrity guard — atomic write pattern
        run: |
          ok=$(grep -rn "fs::write" crates/ --include="*.rs" 2>/dev/null | grep -v ".tmp\|atomic_write\|\.ok()\|_ok\|test\|#\[" || true)
          if [ -n "$ok" ]; then echo "WARN: non-atomic fs::write calls:"; echo "$ok"; fi
      - name: Integrity guard — SQLite connections set PRAGMA
        run: |
          bad=""
          while IFS= read -r line; do
            file=$(echo "$line" | cut -d: -f1)
            lineno=$(echo "$line" | cut -d: -f2)
            # Check next 5 lines for PRAGMA
            block=$(sed -n "$((lineno+1)),$((lineno+5))p" "$file")
            if ! echo "$block" | grep -q "PRAGMA"; then
              bad="$bad  $file:$lineno\n"
            fi
          done < <(grep -rn "Connection::open\|Connection::open_with_flags" crates/ --include="*.rs" 2>/dev/null | grep -v "test\|#\[cfg(test)" || true)
          if [ -n "$bad" ]; then echo "FAIL: Connection::open without PRAGMA in next 5 lines:"; printf "$bad"; exit 1; fi
          echo "All SQLite connections set PRAGMA"
      - name: Integrity guard — regex compiled via LazyLock/OnceLock
        run: |
          bad=$(grep -rn "Regex::new" crates/ --include="*.rs" 2>/dev/null | grep -v "LazyLock\|OnceLock\|test\|#\[cfg(test)" || true)
          if [ -n "$bad" ]; then echo "WARN: Regex::new outside LazyLock (recompiles per invocation):"; echo "$bad"; fi
      - name: Integrity guard — file reads have size guard
        run: |
          bad=""
          while IFS= read -r line; do
            file=$(echo "$line" | cut -d: -f1)
            lineno=$(echo "$line" | cut -d: -f2)
            block=$(sed -n "$((lineno>5 ? lineno-5 : 1)),$((lineno+2))p" "$file")
            if ! echo "$block" | grep -q "meta\.len\|MAX_FILE_SIZE\|// GUARDED"; then
              bad="$bad  $file:$lineno\n"
            fi
          done < <(grep -rn "read_to_string" crates/ --include="*.rs" 2>/dev/null | grep -v "test\|#\[cfg(test)\|\.is_ok\|\.unwrap\|eprintln" || true)
          if [ -n "$bad" ]; then echo "WARN: read_to_string without metadata() or // GUARDED in preceding 5 lines:"; printf "$bad"; fi
      - name: Integrity guard — CLI commands documented in README
        run: |
          cmds=$(grep -A50 "^pub const CLI_COMMANDS" crates/reliary-agent/src/main.rs 2>/dev/null | grep '"' | grep -oP '"[a-z][a-z-]+"' | tr -d '"' | sort -u || true)
          missing=""
          for cmd in $cmds; do
            if ! grep -q "$cmd" README.md 2>/dev/null; then
              missing="$missing  $cmd\n"
            fi
          done
          if [ -n "$missing" ]; then echo "FAIL: CLI commands missing from README:"; printf "$missing"; exit 1; fi
          echo "All CLI commands documented in README"
      - name: Check gitleaks config exists
        run: 'test -f .gitleaks.toml || { echo "FAIL: .gitleaks.toml missing"; exit 1; }'
      - name: Stale file detector
        run: |
          stale=$(find . -name "*.bak" -o -name "*.perf" -o -name "*.old" -not -path "./target/*" 2>/dev/null)
          if [ -n "$stale" ]; then echo "FAIL: stale files: $stale"; exit 1; else echo "No stale files"; fi
      - name: Init smoke test
        run: |
          timeout 10 ./target/release/reliary-agent init </dev/null 2>&1 || true
      - name: Dependency graph diff (against master)
        run: |
          cargo tree -e normal --prefix none 2>/dev/null | sort > /tmp/deps_head.txt
          echo "(dependency diff requires upstream branch reference)"
      - name: cargo audit
        run: cargo audit --deny warnings 2>&1 | tail -5 || true
      - name: cargo deny
        shell: bash
        run: 'cargo deny check bans 2>/dev/null || echo "WARN: deny found violations"'
      - name: Test count check
        run: |
          count=$(cargo test 2>&1 | grep "^test result:" | grep -oP '\d+(?= passed)' | python3 -c "import sys; print(sum(int(l) for l in sys.stdin if l.strip()))")
          echo "Test count: $count"
          [ "$count" -ge 96 ] || echo "WARN: test count below 96 ($count)"
      - name: Binary size check
        run: |
          ls -lh target/release/reliary-agent 2>/dev/null || echo "Binary not built"
      - name: Cross-compile guardrail — no openssl-sys
        run: |
          if cargo tree -e normal 2>/dev/null | grep -q "openssl-sys"; then
            echo "FAIL: openssl-sys in dependency tree — blocks ARM cross-compile"
            exit 1
          fi
          echo "No openssl-sys — cross-compile safe"
