name: CI (guardrails)
"on":
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: read
  pull-requests: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions-rust-lang/setup-rust-toolchain@46a9d261ee2ace4b93b3bd6e867168ac38627b38  # v1.12.0
      - name: Install tools
        run: |
          cargo install cargo-audit cargo-deny 2>/dev/null || true
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck 2>/dev/null || true
          # actionlint — download pre-built binary
          curl -sL "https://github.com/rhysd/actionlint/releases/download/v1.7.7/actionlint_1.7.7_linux_amd64.tar.gz" | sudo tar -xz -C /usr/local/bin actionlint 2>/dev/null || true
      - name: Validate workflow YAML syntax
        run: |
          pip install pyyaml -q 2>/dev/null || true
          for f in .github/workflows/*.yml; do
            python3 -c "import yaml; yaml.safe_load(open('$f'))" || { echo "FAIL: $f has invalid YAML"; exit 1; }
            echo "  OK: $f"
          done
      - name: cargo deny check advisories
        run: cargo deny check advisories 2>/dev/null || { echo 'deny advisories FAIL'; exit 1; }
      - name: cargo deny check sources
        run: cargo deny check sources 2>/dev/null || { echo 'deny sources FAIL'; exit 1; }
      - name: actionlint (workflow validation)
        run: |
          actionlint .github/workflows/*.yml 2>/dev/null || echo "WARN: actionlint found issues in workflow files"
      - name: shellcheck (script linting)
        run: |
          shellcheck scripts/*.sh 2>/dev/null || echo "WARN: shellcheck found script issues"
      - name: semgrep (Rust security rules)
        run: |
          if command -v semgrep >/dev/null 2>&1; then
            semgrep --config .semgrep/rust-security.yml --error crates/ 2>/dev/null || echo "WARN: semgrep found security issues"
          elif pip3 install semgrep -q 2>/dev/null; then
            semgrep --config .semgrep/rust-security.yml --error crates/ 2>/dev/null || echo "WARN: semgrep found security issues"
          else
            echo "semgrep not available — skipping"
          fi
      - name: typos (spell check)
        run: |
          if command -v typos >/dev/null 2>&1; then
            typos --format brief 2>/dev/null || echo "WARN: typos found spelling errors"
          else
            pip3 install typos -q 2>/dev/null && typos --format brief 2>/dev/null || echo "WARN: typos found spelling errors" || echo "typos not available — skipping"
          fi
      - name: lychee (link checker)
        run: |
          if command -v lychee >/dev/null 2>&1; then
            lychee --no-progress README.md CHANGELOG.md CONFIG.md 2>/dev/null || echo "WARN: broken links detected"
          else
            echo "lychee not available — skipping"
          fi
      - name: markdownlint (docs formatting)
        run: |
          if command -v markdownlint >/dev/null 2>&1; then
            markdownlint README.md CHANGELOG.md CONFIG.md pi/GATE.md CONTRIBUTING.md 2>/dev/null || echo "WARN: markdown formatting issues"
          elif npm ls markdownlint-cli 2>/dev/null; then
            npx markdownlint README.md CHANGELOG.md CONFIG.md 2>/dev/null || echo "WARN: markdown formatting issues"
          else
            echo "markdownlint not available — skipping"
          fi
      - name: tarpaulin (code coverage)
        run: |
          if command -v cargo-tarpaulin >/dev/null 2>&1; then
            cargo tarpaulin --out Xml --ignore-tests --exclude-files "tests/*" 2>/dev/null || echo "WARN: tarpaulin failed"
            if [ -f cobertura.xml ]; then
              cov=$(python3 -c 'import xml.etree.ElementTree as ET; tree = ET.parse("cobertura.xml"); lines = tree.findall(".//lines"); cov = sum(int(l.get("lines-covered", 0)) for l in lines) if lines else 0; tot = sum(int(l.get("lines-valid", 0)) for l in lines) if lines else 1; print(f"{cov/tot*100:.1f}" if tot > 0 else "0")' 2>/dev/null)
              echo "Line coverage: ${cov}%"
              [ "$(echo "$cov >= 30" | bc 2>/dev/null || echo 0)" -eq 1 ] || echo "WARN: coverage below 30% (${cov}%)"
            fi
          else
            echo "cargo-tarpaulin not available -- skipping (install: cargo install cargo-tarpaulin)"
          fi
      - name: Integrity guard — commits are signed (PRs only)

