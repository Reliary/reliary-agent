name: OpenSSF Scorecard

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions: read-all

jobs:
  scorecard:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        id: scorecard
        continue-on-error: true
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
          repo_token: ${{ secrets.SCORECARD_TOKEN || secrets.GITHUB_TOKEN }}
          # For full Branch-Protection check, create a fine-grained PAT (metadata: read,
          # administration: read) and save as SCORECARD_TOKEN secret. Without it the
          # Branch-Protection check scores -1.
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: SARIF
          path: results.sarif
          retention-days: 5
      - uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          sarif_file: results.sarif
