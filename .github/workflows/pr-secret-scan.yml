name: PR secret scanning

permissions:
  contents: read
  pull-requests: read

"on":
  pull_request:
    branches: [master]

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sL "https://github.com/gitleaks/gitleaks/releases/download/v8.24.0/gitleaks_8.24.0_linux_x64.tar.gz" | sudo tar -xz -C /usr/local/bin gitleaks
      - name: gitleaks detect (PR changes only)
        run: |
          gitleaks detect --config .gitleaks.toml --log-opts="origin/master..HEAD" --verbose 2>/dev/null || { echo "FAIL: secrets detected in PR changes"; exit 1; }
