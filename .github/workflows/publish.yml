name: Publish to crates.io

permissions:
  contents: read
  id-token: write

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      
      - uses: actions-rust-lang/setup-rust-toolchain@46a9d261ee2ace4b93b3bd6e867168ac38627b38  # v1.12.0
      
      - name: Publish via OIDC (trusted publisher)
        env:
          CARGO_REGISTRIES_CRATES_IO_PROTOCOL: "sparse"
        run: bash scripts/publish_oidc.sh

      - name: Notify
        if: failure()
        run: echo 'publish failed'
