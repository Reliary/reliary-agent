name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
          - target: x86_64-apple-darwin
            os: macos-latest
            ext: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: ".exe"
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            ext: ".exe"

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cross-compile toolchain
        run: |
          rustup target add ${{ matrix.target }}
          if [[ "${{ matrix.target }}" == aarch64-unknown-linux-gnu ]]; then
            sudo apt-get update -qq && sudo apt-get install -y -qq gcc-aarch64-linux-gnu 2>/dev/null
          fi
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package tarball
        run: |
          BIN="target/${{ matrix.target }}/release/reliary-agent${{ matrix.ext }}"
          PKG="reliary-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "${PKG}" && cp "${BIN}" "${PKG}/"
          if [ -f "pi/gate.js" ]; then cp "pi/gate.js" "${PKG}/"; fi
          if [ -f "scripts/install.sh" ]; then cp "scripts/install.sh" "${PKG}/"; fi
          tar czf "${PKG}.tar.gz" "${PKG}/"
          echo "tarball=${PKG}.tar.gz" >> $GITHUB_ENV
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: "*.tar.gz"

  checksums:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Compute SHA256 checksums
        run: |
          find artifacts -type f -name '*.tar.gz' | sort | while read file; do
            sha256sum "$file"
          done > artifacts/SHA256SUMS
          cat artifacts/SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: artifacts/SHA256SUMS

  release:
    needs: [build, checksums]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*/*.tar.gz
            artifacts/checksums/SHA256SUMS
          body: |
            ## reliary-agent ${{ github.ref_name }}

            ### Download
            ```bash
            curl -sSfL https://github.com/Reliary/reliary-agent/releases/download/${{ github.ref_name }}/reliary-${{ github.ref_name }}-$(uname -m)-unknown-linux-gnu.tar.gz | tar xz
            cd reliary-* && ./install.sh
            ```

            ### Verify
            ```bash
            curl -sSfL https://github.com/Reliary/reliary-agent/releases/download/${{ github.ref_name }}/SHA256SUMS
            sha256sum --ignore-missing -c SHA256SUMS
            ```

            ### Binary size (Linux x64)
            $(ls -lh artifacts/*/reliary-*.tar.gz 2>/dev/null | awk '{print $5}' || echo "N/A") tarball

            ### Changelog
            See commits: https://github.com/Reliary/reliary-agent/compare/${{ github.ref_name }}
