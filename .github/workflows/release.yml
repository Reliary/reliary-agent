name: Release

permissions:
  contents: read

"on":
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
          - target: x86_64-apple-darwin
            os: macos-latest
            ext: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: ".exe"
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            ext: ".exe"

    continue-on-error: ${{ matrix.target == 'aarch64-pc-windows-msvc' }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # master
        with:
          toolchain: stable
      - name: Install cross-compile target
        shell: bash
        run: rustup target add ${{ matrix.target }}
      - name: Install ARM Linux cross-compiler
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        shell: bash
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package tarball
        shell: bash
        run: |
          BIN="target/${{ matrix.target }}/release/reliary-agent${{ matrix.ext }}"
          PKG="reliary-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "${PKG}" && cp "${BIN}" "${PKG}/"
          if [ -f "pi/gate.js" ]; then cp "pi/gate.js" "${PKG}/"; fi
          if [ -f "scripts/install.sh" ]; then cp "scripts/install.sh" "${PKG}/"; fi
          tar czf "${PKG}.tar.gz" "${PKG}/"
          echo "tarball=${PKG}.tar.gz" >> $GITHUB_ENV
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: ${{ matrix.target }}
          path: "*.tar.gz"

  checksums:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          path: artifacts
      - name: Compute SHA256 checksums
        run: |
          find artifacts -type f -name '*.tar.gz' | sort | while read file; do
            sha256sum "$file"
          done > artifacts/SHA256SUMS
          cat artifacts/SHA256SUMS
      - name: Install cosign
        uses: sigstore/cosign-installer@3454372f43399081ed03b604cb2d021dabca52bb  # v3.8.2
      - name: Sign checksums with cosign
        run: |
          cosign sign-blob artifacts/SHA256SUMS --bundle artifacts/SHA256SUMS.sig --yes 2>/dev/null || echo "WARN: cosign signing failed (expected on forks)"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: checksums
          path: |
            artifacts/SHA256SUMS
            artifacts/SHA256SUMS.sig

  brew-formula:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          path: artifacts
      - name: Generate Homebrew formula
        run: |
          bash scripts/generate_brew_formula.sh "${{ github.ref_name#v }}" /tmp/homebrew
          cat /tmp/homebrew/reliary-agent.rb
      - name: Push to homebrew-tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set -- skipping brew tap push"
            exit 0
          fi
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/Reliary/homebrew-tap.git" /tmp/homebrew-tap
          cp /tmp/homebrew/reliary-agent.rb /tmp/homebrew-tap/Formula/reliary-agent.rb
          cd /tmp/homebrew-tap
          git config user.name "reliary-bot"
          git config user.email "bot@reliary.dev"
          git add Formula/reliary-agent.rb
          git commit -m "reliary-agent ${{ github.ref_name }}"
          git push origin main

  release:
    needs: [build, checksums]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2.2.2
        with:
          files: |
            artifacts/*/*.tar.gz
            artifacts/checksums/SHA256SUMS
          body: |
            ## reliary-agent ${{ github.ref_name }}

            ### Download
            ```bash
            curl -sSfL https://github.com/Reliary/reliary-agent/releases/download/${{ github.ref_name }}/reliary-${{ github.ref_name }}-$(uname -m)-unknown-linux-gnu.tar.gz | tar xz
            cd reliary-* && ./install.sh
            ```

            ### Verify (SHA256)
            ```bash
            curl -sSfL https://github.com/Reliary/reliary-agent/releases/download/${{ github.ref_name }}/SHA256SUMS
            sha256sum --ignore-missing -c SHA256SUMS
            ```

            ### Verify (Sigstore)
            ```bash
            curl -sSfL https://github.com/Reliary/reliary-agent/releases/download/${{ github.ref_name }}/SHA256SUMS.sig -o SHA256SUMS.sig
            curl -sSfL https://github.com/Reliary/reliary-agent/releases/download/${{ github.ref_name }}/SHA256SUMS -o SHA256SUMS
            cosign verify-blob SHA256SUMS --bundle SHA256SUMS.sig --certificate-identity-regexp "https://github.com/Reliary/reliary-agent/.github/workflows/release.yml" --certificate-oidc-issuer "https://token.actions.githubusercontent.com"
            sha256sum --ignore-missing -c SHA256SUMS
            ```

            ### Binary size (Linux x64)
            $(ls -lh artifacts/*/reliary-*.tar.gz 2>/dev/null | awk '{print $5}' || echo "N/A") tarball

            ### Changelog
            See commits: https://github.com/Reliary/reliary-agent/compare/${{ github.ref_name }}

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Publish to NPM
        run: |
          cd npm
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
