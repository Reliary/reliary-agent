name: Release

"on":
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
          - target: x86_64-apple-darwin
            os: macos-latest
            ext: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: ".exe"
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            ext: ".exe"

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # master
        with:
          toolchain: stable
      - name: Install cross-compile target
        shell: bash
        run: rustup target add ${{ matrix.target }}
      - name: Install ARM Linux cross-compiler
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        shell: bash
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package tarball
        shell: bash
        run: |
          BIN="target/${{ matrix.target }}/release/reliary-agent${{ matrix.ext }}"
          PKG="reliary-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "${PKG}" && cp "${BIN}" "${PKG}/"
          if [ -f "pi/gate.js" ]; then cp "pi/gate.js" "${PKG}/"; fi
          if [ -f "scripts/install.sh" ]; then cp "scripts/install.sh" "${PKG}/"; fi
          tar czf "${PKG}.tar.gz" "${PKG}/"
          echo "tarball=${PKG}.tar.gz" >> $GITHUB_ENV
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: ${{ matrix.target }}
          path: "*.tar.gz"

  checksums:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          path: artifacts
      - name: Compute SHA256 checksums
        run: |
          find artifacts -type f -name '*.tar.gz' | sort | while read file; do
            sha256sum "$file"
          done > artifacts/SHA256SUMS
          cat artifacts/SHA256SUMS
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: checksums
          path: artifacts/SHA256SUMS

  release:
    needs: [build, checksums]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2.2.2
        with:
          files: |
            artifacts/*/*.tar.gz
            artifacts/checksums/SHA256SUMS
          body: |
            ## reliary-agent ${{ github.ref_name }}

            ### Download
            ```bash
            curl -sSfL https://github.com/Reliary/reliary-agent/releases/download/${{ github.ref_name }}/reliary-${{ github.ref_name }}-$(uname -m)-unknown-linux-gnu.tar.gz | tar xz
            cd reliary-* && ./install.sh
            ```

            ### Verify
            ```bash
            curl -sSfL https://github.com/Reliary/reliary-agent/releases/download/${{ github.ref_name }}/SHA256SUMS
            sha256sum --ignore-missing -c SHA256SUMS
            ```

            ### Binary size (Linux x64)
            $(ls -lh artifacts/*/reliary-*.tar.gz 2>/dev/null | awk '{print $5}' || echo "N/A") tarball

            ### Changelog
            See commits: https://github.com/Reliary/reliary-agent/compare/${{ github.ref_name }}
