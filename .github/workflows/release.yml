name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
          - target: x86_64-apple-darwin
            os: macos-latest
            ext: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: ""
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          PKG="reliary-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "${PKG}/bin" "${PKG}/pi"
          cp "target/${{ matrix.target }}/release/reliary-agent" "${PKG}/bin/"
          cp pi/gate.js "${PKG}/pi/"
          cp scripts/install.sh "${PKG}/"
          chmod +x "${PKG}/install.sh"
          tar czf "${PKG}.tar.gz" "${PKG}/"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: "reliary-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*/*.tar.gz
          body: |
            ## reliary-agent ${{ github.ref_name }}

            ### Install
            ```bash
            curl -sSfL https://github.com/Reliary/reliary-agent/releases/download/${{ github.ref_name }}/reliary-${{ github.ref_name }}-$(uname -m)-unknown-linux-gnu.tar.gz | tar xz
            cd reliary-* && ./install.sh
            ```

            ### Changelog
            See commits: https://github.com/Reliary/reliary-agent/compare/${{ github.ref_name }}
