name: Binary Size
on:
  release:
    types: [published]
jobs:
  size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions-rust-lang/setup-rust-toolchain@46a9d261ee2ace4b93b3bd6e867168ac38627b38  # v1.12.0
      - name: Build
        run: cargo build --release
      - name: Record binary size
        run: |
          size=$(stat --format=%s target/release/reliary-agent)
          echo "Binary size: $(numfmt --to=iec $size) ($size bytes)"
          # Comment on the release
          gh release edit "${{ github.ref_name }}" --notes "Binary size: $(numfmt --to=iec $size)" 2>/dev/null || true
