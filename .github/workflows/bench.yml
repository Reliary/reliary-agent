name: Regression Benchmark
on:
  schedule:
    - cron: '0 6 * * 1'  # Mondays 6am
  workflow_dispatch:
jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          repository: Reliary/stria
          ref: bench-bug
          path: stria
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          path: reliary-agent
      - uses: actions-rust-lang/setup-rust-toolchain@46a9d261ee2ace4b93b3bd6e867168ac38627b38  # v1.12.0
        with:
          working-directory: reliary-agent
      - name: Build
        working-directory: reliary-agent
        run: cargo build --release
      - name: Run paired benchmark
        working-directory: reliary-agent
        run: |
          python3 scripts/bench_paired.py 1 2>&1 | tee bench.log
      - name: Extract result
        run: |
          delta=$(grep -oP 'Weighted cost change:\s*[+-]\d+\.?\d*' bench.log | grep -oP '[+-]\d+\.?\d*')
          echo "Delta: $delta%"
          echo "BENCH_DELTA=$delta" >> $GITHUB_ENV
      - name: Post result
        run: |
          echo "Benchmark result: ${BENCH_DELTA:-N/A}%"
