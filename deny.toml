[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "0BSD",
]

[licenses.private]
ignore = false

[bans]
multiple-versions = "deny"
wildcards = "deny"
highlight = "all"
deny = []
skip = [
    { name = "getrandom", version = "0.2" }, # transient dep from ring/rand
    { name = "windows-sys", version = "0.52" }, # transient dep from ring
]
skip-tree = []

[sources]
allow-git = []
unknown-git = "deny"
unknown-registry = "deny"
