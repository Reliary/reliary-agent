[workspace]

resolver = "2"

members = [
    "crates/reliary-core",
    "crates/reliary-search",
    "crates/reliary-compress",
    "crates/reliary-sift",
    "crates/reliary-risk",
    "crates/reliary-memory",
    "crates/reliary-fix",
    "crates/reliary-dead",
    "crates/reliary-agent",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.75"
license = "MIT"
repository = "https://github.com/Reliary/reliary-agent"

[profile.release]
lto = "fat"
codegen-units = 1
panic = "abort"
strip = true
